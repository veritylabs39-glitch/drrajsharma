<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Profile</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
}

/* Glass Card */
.card {
  max-width: 900px;
  margin: 80px auto;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

/* Profile Circle */
.profile {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: url('https://images.unsplash.com/photo-1582750433449-648ed127bb54?auto=format&fit=crop&w=400&q=80') center/cover;
  margin: 0 auto 20px;
  border: 4px solid white;
}

/* Name */
h1 {
  margin: 10px 0;
}

/* Tags */
.tags {
  margin: 15px 0;
}

.tags span {
  background: rgba(255,255,255,0.2);
  padding: 8px 15px;
  border-radius: 20px;
  margin: 5px;
  display: inline-block;
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* Stats */
.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
}

.stats div {
  font-size: 18px;
}
</style>

</head>
<body>

<div class="card">
  
  <div class="profile"></div>

  <h1>Dr. Raj Sharma</h1>
  <p>Senior Cardiologist</p>

  <div class="tags">
    <span>10+ Years Experience</span>
    <span>5000+ Patients</span>
    <span>MBBS, MD</span>
  </div>

  <button class="btn" onclick="window.location.href='index.html#appointment'">
    Book Appointment
  </button>

  <div class="stats">
    <div>⭐ 4.9 Rating</div>
    <div>🏥 AIIMS Delhi</div>
    <div>📍 Delhi</div>
  </div>

</div>

</body>
</html>
